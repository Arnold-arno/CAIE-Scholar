version: "3.9"

services:
  # ── FastAPI backend ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: caiescholar-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      HOST: "0.0.0.0"
      PORT: "8000"
      DEBUG: "false"
      LOG_LEVEL: "INFO"
      ALLOWED_ORIGINS: '["http://localhost:80","http://localhost:3000","http://frontend:80"]'
      CACHE_TTL_SEARCH: "3600"
      CACHE_TTL_PDF: "86400"
    volumes:
      # Persist downloaded PDFs and cache across container restarts
      - caiescholar-papers:/app/data/papers
      - caiescholar-markschemes:/app/data/markschemes
      - caiescholar-cache:/app/data/cache
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── React frontend (Nginx) ───────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "http://localhost:8000"
    container_name: caiescholar-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  caiescholar-papers:
  caiescholar-markschemes:
  caiescholar-cache:
