# render.yaml — Deploy CAIE Scholar on Render.com
# Docs: https://render.com/docs/blueprint-spec
#
# Deploy steps:
#   1. Push this repo to GitHub
#   2. render.com → New → Blueprint → connect repo
#   3. Render detects this file and creates both services
#   4. After backend deploys, copy its URL into VITE_API_URL below → redeploy frontend

services:

  # ── Backend (FastAPI + Gunicorn) ──────────────────────────────────────────
  - type: web
    name: caiescholar-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: backend

    # Pin Python 3.12 — pydantic-core and lxml have pre-built wheels for 3.12.
    # Without this Render defaults to 3.14 which has no wheels and fails to build.
    pythonVersion: "3.12.3"

    # Install dependencies. lxml is excluded because:
    #   - It is a C extension with no wheel for Python 3.14
    #   - The scraper uses html.parser (stdlib) anyway so lxml is never called
    #   - Removing it with --ignore-requires-python is not needed on 3.12 (wheel exists)
    #   - If you ever see an lxml build error, change to:
    #     pip install -r requirements.txt --constraint <(echo "lxml==")
    buildCommand: pip install -r requirements.txt

    # Gunicorn starts multiple uvicorn worker processes for production throughput
    startCommand: gunicorn main:app -c gunicorn.conf.py

    healthCheckPath: /api/health

    envVars:
      - key: HOST
        value: "0.0.0.0"
      - key: PORT
        value: "10000"
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: "INFO"
      - key: ALLOWED_ORIGINS
        value: '["https://caiescholar-frontend.onrender.com"]'
        # ↑ Replace with your actual frontend URL after the first deploy
      - key: CACHE_TTL_SEARCH
        value: "3600"
      - key: CACHE_TTL_PDF
        value: "86400"
      - key: SCRAPER_TIMEOUT
        value: "15"
      - key: SCRAPER_MAX_RETRIES
        value: "3"

    disk:
      name: caiescholar-data
      mountPath: /app/data
      sizeGB: 5

  # ── Frontend (Static Site via Nginx) ──────────────────────────────────────
  - type: web
    name: caiescholar-frontend
    runtime: static
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist

    headers:
      - path: /*
        name: Cache-Control
        value: "no-cache"
      - path: /assets/*
        name: Cache-Control
        value: "public, max-age=31536000, immutable"

    routes:
      # React SPA — all paths must serve index.html so the router works
      - type: rewrite
        source: /*
        destination: /index.html

    envVars:
      - key: VITE_API_URL
        value: https://caiescholar-backend.onrender.com
        # ↑ REPLACE with your real backend URL once it deploys
