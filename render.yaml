# render.yaml — Deploy CAIE Scholar on Render.com
#
# Deploy steps:
#   1. Push this repo to GitHub
#   2. render.com → New → Blueprint → connect your repo
#   3. Render detects this file and creates both services automatically
#   4. Once backend is live: copy its URL into VITE_API_URL below and redeploy frontend

services:

  # ── Backend (FastAPI + Gunicorn) ──────────────────────────────────────────
  - type: web
    name: caiescholar-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: backend

    # Python version — ALSO set via .python-version and runtime.txt at repo root
    # Render reads the repo root files first; this is an extra safety net
    pythonVersion: "3.12.3"

    # pip install only — no compilation needed on Python 3.12 (all wheels pre-built)
    buildCommand: pip install -r requirements.txt

    startCommand: gunicorn main:app -c gunicorn.conf.py
    healthCheckPath: /api/health

    envVars:
      - key: HOST
        value: "0.0.0.0"
      - key: PORT
        value: "10000"
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: "INFO"
      - key: ALLOWED_ORIGINS
        value: '["https://caiescholar-frontend.onrender.com"]'
      - key: CACHE_TTL_SEARCH
        value: "3600"
      - key: CACHE_TTL_PDF
        value: "86400"
      - key: SCRAPER_TIMEOUT
        value: "15"
      - key: SCRAPER_MAX_RETRIES
        value: "3"

    disk:
      name: caiescholar-data
      mountPath: /app/data
      sizeGB: 5

  # ── Frontend (Static Site) ────────────────────────────────────────────────
  - type: web
    name: caiescholar-frontend
    runtime: static
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist

    headers:
      - path: /*
        name: Cache-Control
        value: "no-cache"
      - path: /assets/*
        name: Cache-Control
        value: "public, max-age=31536000, immutable"

    routes:
      - type: rewrite
        source: /*
        destination: /index.html

    envVars:
      - key: VITE_API_URL
        value: https://caiescholar-backend.onrender.com
        # ↑ Replace with your actual backend URL once it's live
