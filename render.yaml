# render.yaml — Deploy CAIE Scholar on Render.com
# Docs: https://render.com/docs/blueprint-spec
#
# To use:
#   1. Push this repo to GitHub
#   2. Go to render.com → New → Blueprint
#   3. Connect your repo — Render will detect this file and set up both services

services:
  # ── Backend (FastAPI + Gunicorn) ─────────────────────────────────────────────
  - type: web
    name: caiescholar-backend
    runtime: python
    region: oregon
    plan: free                     # change to "starter" or higher for production
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app -c gunicorn.conf.py
    healthCheckPath: /api/health
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000               # Render assigns this automatically; set to match
      - key: DEBUG
        value: false
      - key: LOG_LEVEL
        value: INFO
      - key: ALLOWED_ORIGINS
        value: '["https://caiescholar-frontend.onrender.com"]'
        # ↑ Replace with your actual frontend URL after first deploy
      - key: CACHE_TTL_SEARCH
        value: "3600"
      - key: CACHE_TTL_PDF
        value: "86400"
      - key: PYTHON_VERSION
        value: "3.12.0"
    disk:
      name: caiescholar-data
      mountPath: /app/data
      sizeGB: 5                    # increase if you plan to store many PDFs

  # ── Frontend (Static Site) ───────────────────────────────────────────────────
  - type: web
    name: caiescholar-frontend
    runtime: static
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: "no-cache"
      - path: /assets/*
        name: Cache-Control
        value: "public, max-age=31536000, immutable"
    routes:
      # SPA fallback — all paths serve index.html
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://caiescholar-backend.onrender.com
        # ↑ Replace with the actual backend URL from your backend service
