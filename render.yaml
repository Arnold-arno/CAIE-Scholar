# render.yaml — Deploy CAIE Scholar on Render.com
#
# Steps:
#   1. Push repo to GitHub
#   2. render.com → New → Blueprint → connect repo
#   3. Set secret env vars in the Render dashboard (ANTHROPIC_API_KEY etc.)
#   4. Once backend is live: copy its URL into VITE_API_URL below

services:

  # ── Backend (FastAPI + Gunicorn) ─────────────────────────────────────────
  - type: web
    name: caiescholar-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    pythonVersion: "3.12.3"
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app -c gunicorn.conf.py
    healthCheckPath: /api/health

    envVars:
      - key: HOST
        value: "0.0.0.0"
      - key: PORT
        value: "10000"
      - key: DEBUG
        value: "false"
      - key: LOG_LEVEL
        value: "INFO"
      - key: ALLOWED_ORIGINS
        value: '["https://caiescholar-frontend.onrender.com"]'
      - key: CACHE_TTL_SEARCH
        value: "3600"
      - key: CACHE_TTL_PDF
        value: "86400"
      - key: SCRAPER_TIMEOUT
        value: "15"
      - key: SCRAPER_MAX_RETRIES
        value: "3"

      # ── AI provider keys — set these in the Render dashboard as secret env vars ──
      # At least one notes provider is required for AI Notes.
      # OPENAI_API_KEY is also required for image generation (gpt-image-1).
      - key: ANTHROPIC_API_KEY
        value: ""   # Recommended — console.anthropic.com
      - key: OPENAI_API_KEY
        value: ""   # platform.openai.com — also enables image generation
      - key: GROK_API_KEY
        value: ""   # console.x.ai
      - key: GEMINI_API_KEY
        value: ""   # aistudio.google.com/app/apikey
      - key: COHERE_API_KEY
        value: ""   # dashboard.cohere.com/api-keys

    disk:
      name: caiescholar-data
      mountPath: /app/data
      sizeGB: 5

  # ── Frontend (Static Site) ────────────────────────────────────────────────
  - type: web
    name: caiescholar-frontend
    runtime: static
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist

    headers:
      - path: /*
        name: Cache-Control
        value: "no-cache"
      - path: /assets/*
        name: Cache-Control
        value: "public, max-age=31536000, immutable"

    routes:
      - type: rewrite
        source: /*
        destination: /index.html

    envVars:
      - key: VITE_API_URL
        value: https://caiescholar-backend.onrender.com
